# Docker Compose para desenvolvimento local.
# Sobe PostgreSQL (com pgvector), API e Worker.
#
# Uso:
#   docker compose up -d         # Sobe tudo
#   docker compose up -d db      # Só o banco
#   docker compose logs -f       # Logs
#   docker compose down          # Para tudo
#
# Profiles:
#   docker compose --profile testing up stress   # Sobe o Locust para teste de carga

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_DB: gyros_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gyros_os
      LOG_JSON: "true"
      INTERNAL_SERVICE_TOKEN: dev-token-change-in-production
      # Liga hot reload de uvicorn. Compose é dev-only (Railway usa
      # Nixpacks em prod), mas o flag é explícito pra ninguém ligar
      # --reload em produção sem perceber.
      GYROS_DEV_MODE: "true"
      # `uv pip install --system .` no Dockerfile copia o pacote pra
      # site-packages; sem PYTHONPATH, Python preferiria essa cópia em
      # vez de /app/src bind-mounted (testado: watchfiles reiniciava o
      # processo, mas o processo importava do site-packages estagnado).
      PYTHONPATH: /app/src
    volumes:
      # Bind mount do código: mudanças em ./src refletem dentro do
      # container sem rebuild. Combinado com uvicorn --reload abaixo,
      # tira o passo manual `docker compose up -d --build` que custou
      # ~10min/fatia nas últimas duas. Não toca em Dockerfile.api, então
      # `docker build` sozinho continua produzindo imagem prod-safe.
      - ./src:/app/src
    command: >
      sh -c 'if [ "$$GYROS_DEV_MODE" = "true" ]; then
               exec uvicorn gyros_os.server.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src;
             else
               exec uvicorn gyros_os.server.main:app --host 0.0.0.0 --port 8000;
             fi'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gyros_os
      LOG_JSON: "true"
      TWILIO_OUTBOUND_MODE: ${TWILIO_OUTBOUND_MODE:-mock}
      # Mesmo flag do api — watchfiles reinicia o processo quando algo
      # sob /app/src muda. Importante porque event_handlers/ e worker/
      # mudam toda fatia.
      GYROS_DEV_MODE: "true"
      # Mesmo motivo do api: sem isso, o processo reinicia mas importa
      # da cópia estagnada em site-packages.
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
    command: >
      sh -c 'if [ "$$GYROS_DEV_MODE" = "true" ]; then
               exec python -m watchfiles "python -m gyros_os.worker.main" /app/src;
             else
               exec python -m gyros_os.worker.main;
             fi'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      # API interna via rede do compose (não localhost)
      INTERNAL_API_URL: http://api:8000
      INTERNAL_SERVICE_TOKEN: dev-token-change-in-production
      # Better Auth
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gyros_os
      BETTER_AUTH_SECRET: dev-secret-change-in-production-min-32-chars!!
      BETTER_AUTH_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy

  # Locust para teste de carga.
  # Usa profile "testing" para não subir junto com os serviços principais.
  # Só inicia com: docker compose --profile testing up stress
  stress:
    build:
      context: ./stress
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    environment:
      LOCUST_HOST: http://api:8000
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-test-token}
      TWILIO_WEBHOOK_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    profiles:
      - testing

volumes:
  postgres_data:
